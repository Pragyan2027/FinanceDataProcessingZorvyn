<!DOCTYPE html>
<html>
<head>
    <title>Finance App</title>
</head>
<body>

<h2> Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>

<hr>

<h2> Add Record</h2>
<select id="type">
    <option value="INCOME">Income</option>
    <option value="EXPENSE">Expense</option>
</select>
<input type="number" id="amount" placeholder="Amount">
<input type="text" id="category" placeholder="Category">
<button onclick="addRecord()">Add</button>

<hr>

<h2>Dashboard</h2>
<button onclick="getDashboard()">Load Dashboard</button>

<div id="dashboard"></div>

<style>
    body {
        font-family: Arial;
        padding: 20px;
        background: #f5f5f5;
    }
    input, select {
        margin: 5px;
        padding: 8px;
    }
    button {
        padding: 8px 12px;
        background: #007bff;
        color: white;
        border: none;
        cursor: pointer;
    }
    button:hover {
        background: #0056b3;
    }
    #dashboard {
        margin-top: 15px;
        background: white;
        padding: 10px;
    }
</style>

<script>
    const BASE_URL = "https://financedataprocessingzorvyn.onrender.com";


    let token = localStorage.getItem("token") || "";

    function login() {
        fetch(`${BASE_URL}/auth/login`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: document.getElementById("email").value,
                password: document.getElementById("password").value
            })
        })
        .then(res => {
            if (!res.ok) throw new Error("Login failed");
            return res.json();
        })
        .then(data => {
            console.log("TOKEN:", data.token);
            token = data.token;
            localStorage.setItem("token", token);
            alert("Login successful!");
        })
        .catch(err => alert(err.message));
    }


    function addRecord() {
        if (!token) {
            alert("Login first!");
            return;
        }

        fetch(`${BASE_URL}/records`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                type: document.getElementById("type").value,
                amount: document.getElementById("amount").value,
                category: document.getElementById("category").value
            })
        })
        .then(res => {
            if (!res.ok) throw new Error("Failed to add record");
            return res.json();
        })
        .then(() => alert("Record added!"))
        .catch(err => alert(err.message));
    }


   function getDashboard() {
    if (!token) {
        alert("Please login first!");
        return;
    }

    fetch(`${BASE_URL}/dashboard/summary`, {
        method: "GET",
        headers: {
            "Authorization": "Bearer " + token
        }
    })
    .then(res => {
        if (!res.ok) {
            return res.text().then(text => {
                throw new Error(text);
            });
        }
        return res.json();
    })
    .then(data => {
        document.getElementById("dashboard").innerHTML = `
            <p>Income: ${data.totalIncome}</p>
            <p>Expense: ${data.totalExpense}</p>
            <p>Balance: ${data.totalIncome - data.totalExpense}</p>
            <p>${data.warning || ""}</p>
        `;
    })
    .catch(err => {
        alert("ERROR: " + err.message);
    });
}
</script>

</body>
</html>
